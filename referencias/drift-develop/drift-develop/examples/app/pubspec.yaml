name: app
description: A cross-platform todo tracker built with drift.
publish_to: "none"
resolution: workspace

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  drift: ^2.23.1
  drift_dev: ^2.23.1
  drift_flutter: ^0.3.0
  file_picker: ^10.3.10
  flutter_colorpicker: ^1.0.3
  flutter_riverpod: ^3.0.0-dev
  go_router: ^16.1.0
  intl: ^0.20.2
  sqlite3: ^3.1.5
  path_provider: ^2.0.9
  path: ^1.8.0
  riverpod: ^3.0.0-dev
  stack_trace: ^1.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.1.8
  # We use this to compile the shared web worker for the web database. This dependency
  # isn't required for most apps. You only need it if you want to target the web, use
  # web workers for drift AND want to compile those web workers through `build_runner`.
  # Either way, using this package with Flutter requires a delicate setup described in
  # `build.yaml`.
  build_web_compilers: ^4.0.0
  build: '>=3.0.0 <5.0.0'

flutter:
  uses-material-design: true
