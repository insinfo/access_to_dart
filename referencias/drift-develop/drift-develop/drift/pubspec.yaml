name: drift
description: Drift is a reactive library to store relational data in Dart and Flutter applications.
version: 2.32.0
repository: https://github.com/simolus3/drift
homepage: https://drift.simonbinder.eu/
issue_tracker: https://github.com/simolus3/drift/issues
resolution: workspace

topics:
  - drift
  - database

funding:
  - https://github.com/sponsors/simolus3

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  async: ^2.10.0
  convert: ^3.1.1
  collection: ^1.15.0
  meta: ^1.3.0
  stream_channel: ^2.1.0
  sqlite3: ^3.1.5
  path: ^1.9.0
  stack_trace: ^1.11.1
  web: ^1.0.0

dev_dependencies:
  archive: ^4.0.2
  analyzer: '>=8.0.0 <11.0.0'
  build_test: ^3.2.0-0
  build_verify: ^3.1.0
  build_web_compilers: ^4.2.0
  drift_dev: any
  drift_testcases:
    path: ../extras/integration_tests/drift_testcases
  http: ^1.2.1
  lints: ^6.0.0
  uuid: ^4.5.1
  build_runner: ^2.6.0
  test: ^1.25.0
  mockito: ^5.4.6
  shelf: ^1.4.0
  test_descriptor: ^2.0.1
  vm_service: ^15.0.0
  rxdart: ^0.28.0
  build_daemon: ^4.0.3
  fake_async: ^1.3.0
