name: drift_workspace
publish_to: none

environment:
  sdk: ^3.6.0

workspace:
  - drift
  - drift_dev
  - drift_sqflite
  - drift_flutter
  - sqlparser

#  - docs

  - extras/assets/old_moor_flutter_package
  - extras/assets/old_moor_package
  - extras/benchmarks
  - extras/drift_devtools_extension
  - extras/drift_mariadb
  - extras/drift_postgres
  - extras/encryption
  - extras/integration_tests/drift_testcases
  - extras/integration_tests/ffi_on_flutter
  - extras/integration_tests/legacy_web
  - extras/integration_tests/web_wasm

  - examples/app
  - examples/flutter_web_worker_example
  - examples/migrations_example
  - examples/modular
  - examples/multi_package/client
  - examples/multi_package/server
  - examples/multi_package/shared
  - examples/web_worker_example
  - examples/with_built_value

  - future/drift3
  - future/drift_sqlite
  - future/drift3_postgres

dev_dependencies:
  melos: ^7.0.0

melos:
  name: drift
  repository: https://github.com/simolus3/drift

  scripts:
    downgrade:
      run: dart pub downgrade
      exec: { concurrency: 1 }

    check_format:
      run: dart format -o none --set-exit-if-changed .

    analyze:
      run: dart analyze --fatal-infos
      exec: { concurrency: 1 }

    build:
      run: dart run build_runner build --delete-conflicting-outputs
      exec: { concurrency: 1 }
      packageFilters:
        dependsOn: build_runner

    test:
      run: dart test
      exec: { concurrency: 1 }
      packageFilters:
        dependsOn: test
        ignore: drift_postgres # this is an integration test
