dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

dependency_overrides:
  db_viewer:
    git:
      url: https://github.com/simolus3/db_viewer.git
      path: db_viewer
      ref: 0e360314c992859dba566018f9dc4029fc9b691b
  drift_db_viewer:
    git:
      url: https://github.com/simolus3/db_viewer.git
