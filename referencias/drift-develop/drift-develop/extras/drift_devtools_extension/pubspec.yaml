    sdk: flutter

  devtools_extensions: ^0.4.0
  devtools_app_shared: ^0.4.0
  db_viewer:
  drift_db_viewer:
  rxdart: ^0.28.0
  flutter_riverpod: ^3.0.0-dev.0
  vm_service: ^15.0.0
  path: ^1.8.3
  drift: ^2.12.1
  logging: ^1.2.0
  url_launcher: ^6.1.14
  drift_dev: ^2.13.1
  sqlite3: ^3.0.0
