name: drift_flutter
description: Easily set up drift databases across platforms in Flutter apps.
version: 0.3.1-wip
repository: https://github.com/simolus3/drift
homepage: https://drift.simonbinder.eu/
issue_tracker: https://github.com/simolus3/drift/issues
resolution: workspace

topics:
  - drift
  - database

funding:
  - https://github.com/sponsors/simolus3

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  drift: ^2.30.0
  flutter:
    sdk: flutter
  meta: ^1.3.0
  path: ^1.9.0
  path_provider: ^2.1.5
  sqlite3: ^3.0.0
  # This dependency doesn't do anything, but we don't want users depending on
  # version 0.5.x because the sqlite3 package has been migrated to hooks.
  # Flutter-specific build scripts should be removed.
  sqlite3_flutter_libs: ^0.6.0+eol
  sqlcipher_flutter_libs: ^0.7.0+eol

dev_dependencies:
  build_runner: ^2.4.14
  drift_dev: ^2.21.0
  lints: ^6.0.0
  test: ^1.25.0
  flutter_test:
    sdk: flutter
  test_descriptor: ^2.0.1
  async: ^2.11.0
